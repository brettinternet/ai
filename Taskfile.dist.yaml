---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

dotenv: [.env]

env:
  PYTHONDONTWRITEBYTECODE: "1"
  VIRTUAL_ENV: "{{.ROOT_DIR}}/.venv"

vars:
  OPENCODE_CONFIG_DIR: "{{.HOME}}/.config/opencode"
  CLAUDE_CONFIG_DIR: "{{.HOME}}/.claude"

includes:
  setup: .taskfiles/setup.yaml
  hooks: .taskfiles/hooks.yaml
  notify: .taskfiles/notify.yaml
  mcp: .taskfiles/mcp.yaml
  commands: .taskfiles/commands.yaml
  github: .taskfiles/github.yaml
  agents: .taskfiles/agents.yaml
  plugin: .taskfiles/plugin.yaml

tasks:
  default:
    silent: true
    cmds:
      - task -l

  init:
    desc: Install dependencies and setup environment
    aliases: [setup]
    cmds:
      - task: setup:init
      - task: setup-user
      # - rtk init

  setup-user:
    desc: Setup user commands
    cmds:
      - mkdir -p {{.OPENCODE_CONFIG_DIR}}
      - mkdir -p {{.CLAUDE_CONFIG_DIR}}
      - task: copy-user-config
      - task: commands:setup-user
      - task: mcp:setup-user
      - task: agents:setup-user
      - task: plugin:setup-user
      - task: copy-user-agents-md

  copy-user-config:
    desc: Copy configs
    cmds:
      - cp -f .opencode/opencode.json {{.OPENCODE_CONFIG_DIR}}/opencode.json

  copy-user-agents-md:
    desc: Copy user/AGENTS.md to agent configs
    cmds:
      - cp -f user/AGENTS.md {{.CLAUDE_CONFIG_DIR}}/CLAUDE.md
      - cp -f user/AGENTS.md {{.OPENCODE_CONFIG_DIR}}/AGENTS.md

  claude:docker:
    desc: Start AI agent in Docker
    aliases: [claude:docker]
    cmds:
      - task: docker:build
      - task: docker:run

  check:
    desc: Run code checks
    cmds:
      - prettier --check .

  fix:
    desc: Run code fixes
    cmds:
      - prettier --write .

  test:
    desc: Run tests

  docker:build:
    desc: Build Docker image for AI agent
    aliases: [claude:docker:build]
    cmd: >-
      docker build
      -t brettinternet/claude:latest
      -f Dockerfile.claude .

  docker:run:
    desc: Run Docker container for AI agent
    aliases: [claude:docker:run]
    cmd: >-
      docker run --rm -it
      --name claude
      -e CLAUDE_USER_ID=$(id -u)
      -e CLAUDE_GROUP_ID=$(id -g)
      -v ~/.claude:/home/claude/.claude
      -v ~/.gitconfig:/home/claude/.gitconfig:ro
      -v ~/.claude.json:/home/claude/.claude.json
      -v "$(pwd):/workspace"
      brettinternet/claude:latest

  ccusage:
    desc: Run ccusage tool
    aliases: [cc]
    cmd: ccusage {{.CLI_ARGS}}

  compose:
    desc: Run Docker Compose commands with environment variables
    aliases: [dc]
    cmds:
      - docker-compose {{.CLI_ARGS | default "up -d"}}

  remote:
    desc: Open the remote GitHub repository in default browser
    cmd: >
      {{if eq OS "darwin"}}open{{else if eq OS "linux"}}xdg-open{{else if eq OS "windows"}}start{{else}}open{{end}}
      $(git remote get-url origin | sed 's/\.git$//' | sed 's|git@github.com:|https://github.com/|')
