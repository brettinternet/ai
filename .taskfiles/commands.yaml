---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  REPO_COMMANDS_DIR: "{{.ROOT_DIR}}/commands"
  CLAUDE_USER_COMMANDS_DIR: "{{.HOME}}/.claude/commands"
  OPENCODE_USER_COMMANDS_DIR: "{{.HOME}}/.config/opencode/commands"

tasks:
  setup-user:
    desc: Setup commands for user
    cmds:
      - task: copy-commands
        vars:
          COMMANDS_DIR: "{{.CLAUDE_USER_COMMANDS_DIR}}"
      - task: copy-commands
        vars:
          COMMANDS_DIR: "{{.OPENCODE_USER_COMMANDS_DIR}}"

  copy-commands:
    desc: Symlink commands from repository to user directory
    internal: true
    requires:
      vars: [REPO_COMMANDS_DIR, COMMANDS_DIR]
    cmds:
      - mkdir -p {{.COMMANDS_DIR}}
      - find {{.COMMANDS_DIR}} -maxdepth 1 -type l -lname "{{.REPO_COMMANDS_DIR}}/*" -delete
      - for file in {{.REPO_COMMANDS_DIR}}/*.md; do ln -sf "$file" {{.COMMANDS_DIR}}/; done
