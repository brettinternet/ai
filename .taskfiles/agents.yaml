---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  AGENTS_SRC: "{{.ROOT_DIR}}/agents"
  CLAUDE_AGENTS_DEST: "{{.HOME}}/.claude/agents"
  OPENCODE_AGENTS_DEST: "{{.HOME}}/.config/opencode/agents"

tasks:
  setup-user:
    desc: Add agents to user
    cmds:
      - task: update
        vars:
          TARGET_DIR: "{{.CLAUDE_AGENTS_DEST}}"
      # TODO: some metadata fields don't match between claude and opencode
      # - task: update
      #   vars:
      #     TARGET_DIR: "{{.OPENCODE_AGENTS_DEST}}"

  update:
    desc: Force update all agents to directory
    internal: true
    requires:
      vars: [TARGET_DIR]
    cmds:
      - mkdir -p "{{.TARGET_DIR}}"
      - |
        for agent in "{{.AGENTS_SRC}}"/*.md; do
          name=$(basename "$agent")
          cp "$agent" "{{.TARGET_DIR}}/$name"
          echo "Updated: $name"
        done
