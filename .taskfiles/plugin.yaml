---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  setup-user:
    desc: Install Claude Code plugins for user
    cmds:
      - task: claude:install
        vars:
          PLUGIN: superpowers@claude-plugins-official
      # - task: opencode:install
      #   vars:
      #     PLUGIN: superpowers@git+https://github.com/obra/superpowers.git

  claude:install:
    desc: Install a plugin if not already installed
    internal: true
    requires:
      vars: [PLUGIN]
    vars:
      PLUGIN_NAME:
        sh: echo "{{.PLUGIN}}" | cut -d'@' -f1
    status:
      - claude plugin list | grep -q "{{.PLUGIN_NAME}}"
    cmds:
      - claude plugin install -s user {{.PLUGIN}}

  # Running at $HOME doesn't install for global user, it just installs in $HOME. No way from CLI.
  # opencode:install:
  #   desc: Install a plugin
  #   internal: true
  #   # dir: /{{.HOME}}
  #   requires:
  #     vars: [PLUGIN]
  #   cmds:
  #     - opencode plugin {{.PLUGIN}}

  claude:update:
    desc: Update all installed Claude Code plugins
    cmds:
      - claude plugin update superpowers

  claude:uninstall:
    desc: Uninstall all managed Claude Code plugins
    cmds:
      - claude plugin uninstall superpowers || true

  claude:enable:
    desc: "Enable a plugin (PLUGIN=name, or -- name) or all managed plugins if no arg given"
    cmds:
      - |
        if [ -n "{{.PLUGIN}}" ]; then
          claude plugin enable "{{.PLUGIN}}"
        elif [ -n "{{.CLI_ARGS}}" ]; then
          claude plugin enable {{.CLI_ARGS}}
        else
          claude plugin enable superpowers
        fi

  claude:disable:
    desc: "Disable a plugin (PLUGIN=name, or -- name) or all plugins if no arg given"
    cmds:
      - |
        if [ -n "{{.PLUGIN}}" ]; then
          claude plugin disable "{{.PLUGIN}}"
        elif [ -n "{{.CLI_ARGS}}" ]; then
          claude plugin disable {{.CLI_ARGS}}
        else
          claude plugin disable --all
        fi
